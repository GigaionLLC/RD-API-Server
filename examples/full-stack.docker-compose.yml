# Full self-hosted RustDesk stack
#   hbbs  – ID/rendezvous server      hbbr – relay server
#   db    – MariaDB (for the API)      api  – this project (admin console + client API)
#
# Setup:
#   1. Set a unique ADMIN_PASS (at least 12 characters) in your shell or a local .env file,
#      then replace every CHANGE_ME and your-domain.com value below.
#   2. Put the API behind a TLS-terminating reverse proxy. The loopback binding below supports
#      a host-based proxy. For a containerized proxy, remove that port, attach the proxy + API to
#      a dedicated internal network, and proxy directly to rustdesk-api:80.
#   3. docker compose -f full-stack.docker-compose.yml up -d
#   4. hbbs generates a key on first start. Copy its public key into RUSTDESK_KEY:
#        cat ./data/hbbs/id_ed25519.pub
#      then re-run:  docker compose -f full-stack.docker-compose.yml up -d
#   5. Log in at https://api.your-domain.com/admin  (ADMIN_USER / ADMIN_PASS).

services:

  hbbs:
    image: rustdesk/rustdesk-server:1.1.15@sha256:10818ec05b179039c6660f4d8e74b303f0db2858bbad2b18e24992ea22d54cd6
    container_name: rustdesk-hbbs
    command: hbbs -r relay.your-domain.com:21117 -k _
    ports:
      - 21115:21115
      - 21116:21116
      - 21116:21116/udp
      - 21118:21118
    volumes:
      - ./data/hbbs:/root
    networks: [ rustdesk ]
    depends_on: [ hbbr ]
    restart: unless-stopped

  hbbr:
    image: rustdesk/rustdesk-server:1.1.15@sha256:10818ec05b179039c6660f4d8e74b303f0db2858bbad2b18e24992ea22d54cd6
    container_name: rustdesk-hbbr
    command: hbbr -k _
    ports:
      - 21117:21117
      - 21119:21119
    volumes:
      - ./data/hbbr:/root
    networks: [ rustdesk ]
    restart: unless-stopped

  db:
    image: mariadb:11.8.8@sha256:efb4959ef2c835cd735dbc388eb9ad6aab0c78dd64febcd51bc17481111890c4
    container_name: rustdesk-db
    environment:
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
      MARIADB_DATABASE: rustdesk_api
      MARIADB_USER: rustdesk
      MARIADB_PASSWORD: CHANGE_ME_db_password
    volumes:
      - ./data/db:/var/lib/mysql
    networks: [ rustdesk ]
    restart: unless-stopped

  api:
    # Keep the default release channel, or set RUSTDESK_API_IMAGE to a verified tag+digest.
    image: "${RUSTDESK_API_IMAGE:-ghcr.io/gigaionllc/rustdesk-api-server:latest}"
    container_name: rustdesk-api
    stop_grace_period: "${RUNTIME_STOP_GRACE_PERIOD:-35s}"
    environment:
      - TZ=UTC
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://api.your-domain.com
      # Leave APP_KEY empty to use ./data/api/app/.appkey. For multiple API replicas, provide
      # one shared APP_KEY and the same comma-separated APP_PREVIOUS_KEYS to every replica.
      - "APP_KEY=${APP_KEY:-}"
      - "APP_PREVIOUS_KEYS=${APP_PREVIOUS_KEYS:-}"
      - "AUTH_TWO_FACTOR_MANAGEMENT_TIMEOUT=${AUTH_TWO_FACTOR_MANAGEMENT_TIMEOUT:-300}"
      - "HASH_VERIFY=${HASH_VERIFY:-false}"
      - "ARGON_MEMORY=${ARGON_MEMORY:-65536}"
      - "ARGON_THREADS=${ARGON_THREADS:-1}"
      - "ARGON_TIME=${ARGON_TIME:-4}"
      # Exact application-observed IP, or narrow isolated shared-network CIDR, of the TLS proxy:
      - TRUSTED_PROXIES=CHANGE_ME_proxy_ip_or_cidr
      - SESSION_SECURE_COOKIE=true
      # The image defaults to an 8-second drain for old Compose files; this stack pairs a
      # 30-second runtime drain with the 35-second stop_grace_period above.
      - "RUNTIME_SHUTDOWN_GRACE_SECONDS=${RUNTIME_SHUTDOWN_GRACE_SECONDS:-30}"
      # First-run admin (seeded once). There is deliberately no production password default:
      - ADMIN_USER=admin
      - "ADMIN_PASS=${ADMIN_PASS:-}"
      # Database:
      - DB_CONNECTION=mariadb
      - "DB_URL=${DB_URL:-}"
      - DB_HOST=rustdesk-db
      - DB_PORT=3306
      - DB_DATABASE=rustdesk_api
      - DB_USERNAME=rustdesk
      - DB_PASSWORD=CHANGE_ME_db_password
      # Endpoints handed to clients:
      - RUSTDESK_ID_SERVER=id.your-domain.com:21116
      - RUSTDESK_RELAY_SERVER=relay.your-domain.com:21117
      - RUSTDESK_API_SERVER=https://api.your-domain.com
      # Public key — from ./data/hbbs/id_ed25519.pub after hbbs first starts:
      - RUSTDESK_KEY=CHANGE_ME_public_key
      # Unknown devices must enroll with a deployment token unless both legacy switches are changed.
      - RUSTDESK_REQUIRE_DEPLOYMENT=true
      - RUSTDESK_AUTO_REGISTER=false
      - RUSTDESK_AUTO_REGISTER_PER_IP_PER_MINUTE=30
      - RUSTDESK_AUTO_REGISTER_GLOBAL_PER_MINUTE=100
      - RUSTDESK_AUTO_REGISTER_MAX_DEVICES=5000
      # Recording upload is disabled by default. Stock clients need an explicit trusted CIDR:
      # - RUSTDESK_RECORDING_UPLOAD_ENABLED=true
      # - RUSTDESK_RECORDING_UPLOAD_ALLOWED_IPS=CHANGE_ME_device_network_cidr
      # Optional SMTP (2FA email codes, invitations, alarms):
      # - MAIL_MAILER=smtp
      # - MAIL_HOST=smtp.example.com
      # - MAIL_PORT=587
      # - MAIL_USERNAME=
      # - MAIL_PASSWORD=
      # - MAIL_FROM_ADDRESS=no-reply@your-domain.com
    ports:
      - 127.0.0.1:21114:80  # host-based TLS proxy only; never expose this backend publicly
    volumes:
      - ./data/api:/var/www/html/storage
    networks: [ rustdesk ]
    depends_on: [ db ]
    restart: unless-stopped

networks:
  rustdesk:
    name: rustdesk
