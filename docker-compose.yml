# rustdesk-api — production self-host (recommended).
#
#   1. Set ADMIN_PASS, DB_PASSWORD, and the RUSTDESK_* values in a local .env file.
#   2. docker compose up -d
#
# Pulls the published image and runs on http://localhost:21114 (admin at /admin), backed by
# MariaDB.
#
# MariaDB is the sole supported database and is included in this stack.
#
# Before first run, set these (shell env or a .env file next to this compose file):
#   ADMIN_PASS   - unique first-run admin password (required, at least 12 characters)
#   DB_PASSWORD  - MariaDB password for the app user (change from the default)
#   RUSTDESK_*   - your hbbs/hbbr endpoints + key (see QUICKSTART.md)
#
# Other compose files:
#   docker-compose.dev.yml                 - build the image locally from source (dev)
#   examples/full-stack.docker-compose.yml - full hbbs + hbbr + db + api stack
#   docker/compose.toolchain.yml           - dev toolchain for composer/artisan/tests

services:
  rustdesk-api:
    # `latest` is this project's release channel. Set RUSTDESK_API_IMAGE to a tag+digest
    # when a deployment must stay on one verified build (see docker/README.md).
    image: "${RUSTDESK_API_IMAGE:-ghcr.io/gigaionllc/rustdesk-api-server:latest}"
    container_name: rustdesk-api
    restart: unless-stopped
    ports:
      - "${PORT:-21114}:80"
    environment:
      APP_NAME: "RustDesk API"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost:21114}"
      # Leave APP_KEY empty to use the persistent storage/app/.appkey. When an explicit key is
      # supplied, keep it stable and retain rotated keys in the comma-separated previous list.
      APP_KEY: "${APP_KEY:-}"
      APP_PREVIOUS_KEYS: "${APP_PREVIOUS_KEYS:-}"
      AUTH_TWO_FACTOR_MANAGEMENT_TIMEOUT: "${AUTH_TWO_FACTOR_MANAGEMENT_TIMEOUT:-300}"
      HASH_VERIFY: "${HASH_VERIFY:-false}"
      ARGON_MEMORY: "${ARGON_MEMORY:-65536}"
      ARGON_THREADS: "${ARGON_THREADS:-1}"
      ARGON_TIME: "${ARGON_TIME:-4}"
      # Set only when a reverse proxy is in front; use its exact container IP or network CIDR.
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-}"

      # First-run admin account. There is no production fallback: the runtime refuses to create
      # a missing administrator from an empty, known, placeholder, derived, or short password.
      # Existing installations may remove ADMIN_PASS after the administrator has been created.
      ADMIN_USER: "${ADMIN_USER:-admin}"
      ADMIN_PASS: "${ADMIN_PASS:-}"

      # Database — MariaDB only (matches the `db` service below). CHANGE DB_PASSWORD.
      DB_CONNECTION: "${DB_CONNECTION:-mariadb}"
      DB_URL: "${DB_URL:-}"
      DB_HOST: "${DB_HOST:-db}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_DATABASE: "${DB_DATABASE:-rustdesk_api}"
      DB_USERNAME: "${DB_USERNAME:-rustdesk}"
      DB_PASSWORD: "${DB_PASSWORD:-rustdesk}"
      DB_SOCKET: "${DB_SOCKET:-}"
      DB_CONNECT_TIMEOUT: "${DB_CONNECT_TIMEOUT:-5}"
      MYSQL_ATTR_SSL_CA: "${MYSQL_ATTR_SSL_CA:-}"

      # RustDesk server endpoints handed to clients (set these to your hbbs/hbbr).
      RUSTDESK_ID_SERVER: "${RUSTDESK_ID_SERVER:-}"
      RUSTDESK_RELAY_SERVER: "${RUSTDESK_RELAY_SERVER:-}"
      RUSTDESK_API_SERVER: "${RUSTDESK_API_SERVER:-${APP_URL:-http://localhost:21114}}"
      RUSTDESK_KEY: "${RUSTDESK_KEY:-}"
      RUSTDESK_REQUIRE_DEPLOYMENT: "${RUSTDESK_REQUIRE_DEPLOYMENT:-true}"
      RUSTDESK_AUTO_REGISTER: "${RUSTDESK_AUTO_REGISTER:-false}"
      RUSTDESK_AUTO_REGISTER_PER_IP_PER_MINUTE: "${RUSTDESK_AUTO_REGISTER_PER_IP_PER_MINUTE:-30}"
      RUSTDESK_AUTO_REGISTER_GLOBAL_PER_MINUTE: "${RUSTDESK_AUTO_REGISTER_GLOBAL_PER_MINUTE:-100}"
      RUSTDESK_AUTO_REGISTER_MAX_DEVICES: "${RUSTDESK_AUTO_REGISTER_MAX_DEVICES:-5000}"

      # Recording uploads stay off until enabled plus a source CIDR or proxy/header token.
      RUSTDESK_RECORDING_UPLOAD_ENABLED: "${RUSTDESK_RECORDING_UPLOAD_ENABLED:-false}"
      RUSTDESK_RECORDING_UPLOAD_ALLOWED_IPS: "${RUSTDESK_RECORDING_UPLOAD_ALLOWED_IPS:-}"
      RUSTDESK_RECORDING_UPLOAD_TOKEN: "${RUSTDESK_RECORDING_UPLOAD_TOKEN:-}"
      RUSTDESK_RECORDING_UPLOAD_RATE_LIMIT: "${RUSTDESK_RECORDING_UPLOAD_RATE_LIMIT:-600}"
      RUSTDESK_RECORDING_UPLOAD_MAX_CHUNK_BYTES: "${RUSTDESK_RECORDING_UPLOAD_MAX_CHUNK_BYTES:-8388608}"
      RUSTDESK_RECORDING_UPLOAD_MAX_FILE_BYTES: "${RUSTDESK_RECORDING_UPLOAD_MAX_FILE_BYTES:-2147483648}"
      RUSTDESK_RECORDING_UPLOAD_MAX_TOTAL_BYTES: "${RUSTDESK_RECORDING_UPLOAD_MAX_TOTAL_BYTES:-10737418240}"
      RUSTDESK_RECORDING_UPLOAD_MAX_TOTAL_FILES: "${RUSTDESK_RECORDING_UPLOAD_MAX_TOTAL_FILES:-5000}"
      RUSTDESK_RECORDING_UPLOAD_MAX_ACTIVE_PER_SOURCE: "${RUSTDESK_RECORDING_UPLOAD_MAX_ACTIVE_PER_SOURCE:-4}"

      # LDAP / Active Directory (optional; disabled and securely fail-closed by default).
      LDAP_ENABLED: "${LDAP_ENABLED:-false}"
      LDAP_HOST: "${LDAP_HOST:-ldap.example.com}"
      LDAP_PORT: "${LDAP_PORT:-389}"
      LDAP_BASE_DN: "${LDAP_BASE_DN:-dc=example,dc=com}"
      LDAP_PROVIDER_ID: "${LDAP_PROVIDER_ID:-}"
      LDAP_SUBJECT_ATTR: "${LDAP_SUBJECT_ATTR:-entryUUID}"
      LDAP_BIND_DN: "${LDAP_BIND_DN:-}"
      LDAP_BIND_PASSWORD: "${LDAP_BIND_PASSWORD:-}"
      LDAP_USER_FILTER: "${LDAP_USER_FILTER:-(uid=%s)}"
      LDAP_USERNAME_ATTR: "${LDAP_USERNAME_ATTR:-uid}"
      LDAP_EMAIL_ATTR: "${LDAP_EMAIL_ATTR:-mail}"
      LDAP_DISPLAYNAME_ATTR: "${LDAP_DISPLAYNAME_ATTR:-cn}"
      LDAP_USE_STARTTLS: "${LDAP_USE_STARTTLS:-true}"
      LDAP_TLS_VERIFY: "${LDAP_TLS_VERIFY:-true}"
      LDAP_ALLOW_INSECURE: "${LDAP_ALLOW_INSECURE:-false}"
      LDAP_ADMIN_GROUP: "${LDAP_ADMIN_GROUP:-}"
      LDAP_ALLOW_GROUP: "${LDAP_ALLOW_GROUP:-}"
      LDAP_SYNC: "${LDAP_SYNC:-false}"

      # SMTP (optional — for 2FA email codes, invitations, alarms).
      MAIL_MAILER: "${MAIL_MAILER:-log}"
      MAIL_HOST: "${MAIL_HOST:-}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-no-reply@example.com}"
    volumes:
      # Holds recordings, sessions, logs, and the app key (the DB lives in the db volume).
      - rustdesk-data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11.8.8@sha256:efb4959ef2c835cd735dbc388eb9ad6aab0c78dd64febcd51bc17481111890c4
    container_name: rustdesk-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: "${DB_DATABASE:-rustdesk_api}"
      MARIADB_USER: "${DB_USERNAME:-rustdesk}"
      MARIADB_PASSWORD: "${DB_PASSWORD:-rustdesk}"
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - rustdesk-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  rustdesk-data:
  rustdesk-db:
