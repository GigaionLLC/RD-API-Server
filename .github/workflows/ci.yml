name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  php:
    name: PHP gates + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          extensions: pdo_sqlite, mbstring, intl, gmp, bcmath, zip, gd, sockets
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Prepare env
        run: cp .env.example .env && php artisan key:generate
      - name: Pint (code style)
        run: ./vendor/bin/pint --test
      - name: PHPStan (static analysis)
        run: ./vendor/bin/phpstan analyse --memory-limit=512M
      - name: PHPUnit
        run: php artisan test

  js:
    name: JS lint + vendor integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.18.0'
          cache: npm
      - name: Install locked dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Verify checked-in admin vendor assets
        run: npm run check:vendor
      - name: ESLint
        run: npm run lint:js

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: php
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          extensions: pdo_sqlite, mbstring, intl, gmp, bcmath, zip, gd, sockets
      - run: composer install --no-interaction --prefer-dist
      - name: Prepare app
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan migrate --force
          php artisan db:seed --force
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.18.0'
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - name: Serve app
        # PHP_CLI_SERVER_WORKERS lets the built-in server handle concurrent requests
        # (Playwright runs specs in parallel; a single worker would serialise/stall them).
        run: PHP_CLI_SERVER_WORKERS=8 php artisan serve --host=127.0.0.1 --port=8088 &
      - name: Wait for app
        run: for i in $(seq 1 30); do curl -sf http://127.0.0.1:8088/api/version && break; sleep 2; done
      - name: Run E2E
        run: npx playwright test
        env:
          E2E_BASE_URL: http://127.0.0.1:8088
          E2E_ADMIN_USER: admin
          E2E_ADMIN_PASS: admin123456
