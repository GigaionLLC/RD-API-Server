name: CI

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    tags:
      - "v*.*.*"
    paths-ignore:
      - "*.md"
      - "**/*.md"
      - "docs/**"
      - "Wiki/**"
      - "DevOps/**"
      - "Skills/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

env:
  REGISTRY_IMAGE: ghcr.io/gigaionllc/rustdesk-api-server

jobs:
  php:
    name: PHP gates + tests
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.8.8@sha256:efb4959ef2c835cd735dbc388eb9ad6aab0c78dd64febcd51bc17481111890c4
        env:
          MARIADB_ROOT_PASSWORD: rustdesk_test_root
          MARIADB_DATABASE: rustdesk_api_testing
          MARIADB_USER: rustdesk_test
          MARIADB_PASSWORD: rustdesk_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=30
    env:
      DB_CONNECTION: mariadb
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: rustdesk_api_testing
      DB_USERNAME: rustdesk_test
      DB_PASSWORD: rustdesk_test
      DB_SOCKET: ""
      DB_URL: ""
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          extensions: pdo_mysql, mbstring, intl, gmp, bcmath, zip, gd, sockets, ldap
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Prepare env
        run: cp .env.example .env && php artisan key:generate
      - name: Shell script syntax
        run: |
          find docker scripts tests -type f -name '*.sh' -print0 \
            | xargs -0 --no-run-if-empty bash -n
      - name: Pint (code style)
        run: ./vendor/bin/pint --test
      - name: PHPStan (static analysis)
        run: ./vendor/bin/phpstan analyse --memory-limit=512M
      - name: PHPUnit
        run: php artisan test
      - name: Verify InnoDB schema
        run: |
          php <<'PHP'
          <?php

          $pdo = new PDO(
              'mysql:host=127.0.0.1;port=3306;dbname=rustdesk_api_testing;charset=utf8mb4',
              getenv('DB_USERNAME') ?: '',
              getenv('DB_PASSWORD') ?: '',
              [PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION, PDO::ATTR_TIMEOUT => 5],
          );
          $query = $pdo->prepare(
              'SELECT COUNT(*) FROM information_schema.TABLES '
              .'WHERE TABLE_SCHEMA = ? AND TABLE_TYPE = ? AND COALESCE(UPPER(ENGINE), ?) <> ?'
          );
          $query->execute(['rustdesk_api_testing', 'BASE TABLE', '', 'INNODB']);

          if ((int) $query->fetchColumn() !== 0) {
              fwrite(STDERR, "Every application table must use InnoDB.\n");
              exit(1);
          }
          PHP

  js:
    name: JS lint + vendor integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24.18.0'
          cache: npm
      - name: Install locked dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Verify checked-in admin vendor assets
        run: npm run check:vendor
      - name: ESLint
        run: npm run lint:js
      - name: Validate performance harness configuration
        env:
          PERF_IMAGE: ghcr.io/gigaionllc/rustdesk-api-server:1.0.1@sha256:65fdd380ab101ef8fcf40e8281aa303257559f3da4008dfb00782138e71268e2
          PERF_RESULTS_DIR: /tmp/rustdesk-api-performance-results
        run: |
          docker compose -f docker/compose.performance.yml --profile load config --quiet
          docker run --rm --read-only --cap-drop ALL --security-opt no-new-privileges \
            -v "$PWD/tests/Performance:/performance:ro" \
            grafana/k6:1.4.2@sha256:3656673de3f30424e8ebcfa46acd9558d83b6a43612d0f668ffeac953950c6c7 \
            inspect /performance/heartbeat.js >/dev/null

  runtime:
    name: Production runtime (AMD64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact source commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build production image for native integration
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/Dockerfile.runtime
          platforms: linux/amd64
          load: true
          tags: rustdesk-api:ci-runtime
          cache-from: type=gha,scope=runtime-amd64
          cache-to: type=gha,scope=runtime-amd64,mode=max

      - name: Exercise production Nginx and PHP-FPM runtime
        run: bash scripts/ci-runtime-smoke.sh rustdesk-api:ci-runtime amd64 linux/amd64

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: php
    services:
      mariadb:
        image: mariadb:11.8.8@sha256:efb4959ef2c835cd735dbc388eb9ad6aab0c78dd64febcd51bc17481111890c4
        env:
          MARIADB_ROOT_PASSWORD: rustdesk_e2e_root
          MARIADB_DATABASE: rustdesk_api_e2e
          MARIADB_USER: rustdesk_e2e
          MARIADB_PASSWORD: rustdesk_e2e
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=30
    env:
      DB_CONNECTION: mariadb
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: rustdesk_api_e2e
      DB_USERNAME: rustdesk_e2e
      DB_PASSWORD: rustdesk_e2e
      DB_SOCKET: ""
      DB_URL: ""
      CACHE_STORE: array
      MAIL_MAILER: array
      SESSION_DRIVER: database
      RUSTDESK_REQUIRE_DEPLOYMENT: "false"
      RUSTDESK_AUTO_REGISTER: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          extensions: pdo_mysql, mbstring, intl, gmp, bcmath, zip, gd, sockets, ldap
      - run: composer install --no-interaction --prefer-dist
      - name: Prepare app
        run: |
          cp .env.example .env
          php artisan key:generate
          php <<'PHP'
          <?php

          try {
              $host = getenv('DB_HOST') ?: '';
              $port = getenv('DB_PORT') ?: '';
              $database = getenv('DB_DATABASE') ?: '';

              if ($host !== '127.0.0.1' || $port !== '3306' || $database !== 'rustdesk_api_e2e') {
                  throw new RuntimeException('Unsafe configured target.');
              }

              $pdo = new PDO(
                  "mysql:host={$host};port={$port};dbname={$database};charset=utf8mb4",
                  getenv('DB_USERNAME') ?: '',
                  getenv('DB_PASSWORD') ?: '',
                  [
                      PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION,
                      PDO::ATTR_TIMEOUT => 5,
                  ],
              );
              $server = $pdo->query(
                  'SELECT DATABASE() AS database_name, VERSION() AS server_version, '
                  .'@@default_storage_engine AS default_storage_engine'
              )->fetch(PDO::FETCH_ASSOC);

              if (! is_array($server)
                  || ($server['database_name'] ?? '') !== 'rustdesk_api_e2e'
                  || ! str_contains(strtolower((string) ($server['server_version'] ?? '')), 'mariadb')
                  || strtolower((string) ($server['default_storage_engine'] ?? '')) !== 'innodb') {
                  throw new RuntimeException('Unsafe live target.');
              }
          } catch (Throwable) {
              fwrite(STDERR, "E2E database safety probe failed; migrations were not run.\n");
              exit(1);
          }

          fwrite(STDOUT, "Verified isolated MariaDB/InnoDB E2E database.\n");
          PHP
          php artisan migrate:fresh --force
          php artisan db:seed --force
          php <<'PHP'
          <?php

          $pdo = new PDO(
              'mysql:host=127.0.0.1;port=3306;dbname=rustdesk_api_e2e;charset=utf8mb4',
              getenv('DB_USERNAME') ?: '',
              getenv('DB_PASSWORD') ?: '',
              [PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION, PDO::ATTR_TIMEOUT => 5],
          );
          $query = $pdo->prepare(
              'SELECT COUNT(*) FROM information_schema.TABLES '
              .'WHERE TABLE_SCHEMA = ? AND TABLE_TYPE = ? AND COALESCE(UPPER(ENGINE), ?) <> ?'
          );
          $query->execute(['rustdesk_api_e2e', 'BASE TABLE', '', 'INNODB']);

          if ((int) $query->fetchColumn() !== 0) {
              fwrite(STDERR, "Every application table must use InnoDB.\n");
              exit(1);
          }
          PHP
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24.18.0'
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - name: Serve app
        # PHP_CLI_SERVER_WORKERS lets the built-in server handle concurrent requests
        # (Playwright runs specs in parallel; a single worker would serialise/stall them).
        # --no-reload preserves the job's isolated MariaDB environment in the child server.
        run: PHP_CLI_SERVER_WORKERS=8 php artisan serve --no-reload --host=127.0.0.1 --port=8088 &
      - name: Wait for app
        run: |
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8088/admin/login; then
              exit 0
            fi
            sleep 2
          done
          echo "Application did not become ready within 60 seconds." >&2
          exit 1
      - name: Run E2E
        run: npx playwright test
        env:
          E2E_BASE_URL: http://127.0.0.1:8088
          E2E_ADMIN_USER: admin
          E2E_ADMIN_PASS: admin12345678

  publish_prepare:
    name: Prepare image publication
    runs-on: ubuntu-24.04
    needs: [php, js, runtime, e2e]
    if: >-
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - name: Checkout exact source commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Validate publication ref
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          case "$GITHUB_REF" in
            refs/heads/main)
              ;;
            refs/tags/v*)
              if [[ ! "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
                echo "Release tags must use stable Semantic Versioning: vMAJOR.MINOR.PATCH." >&2
                exit 1
              fi

              main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
              if [[ "$main_sha" != "$GITHUB_SHA" ]]; then
                echo "Release tag $GITHUB_REF_NAME does not point to the current main commit." >&2
                exit 1
              fi

              ref_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}")"
              ref_type="$(jq -r '.object.type' <<< "$ref_json")"
              ref_sha="$(jq -r '.object.sha' <<< "$ref_json")"
              if [[ "$ref_type" != "tag" ]]; then
                echo "Release tag $GITHUB_REF_NAME must be annotated; lightweight tags are rejected." >&2
                exit 1
              fi

              tag_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${ref_sha}")"
              if [[ "$(jq -r '.object.type' <<< "$tag_json")" != "commit" || "$(jq -r '.object.sha' <<< "$tag_json")" != "$GITHUB_SHA" ]]; then
                echo "Annotated release tag $GITHUB_REF_NAME must point directly to $GITHUB_SHA." >&2
                exit 1
              fi
              ;;
            *)
              echo "Ref $GITHUB_REF is not eligible for image publication." >&2
              exit 1
              ;;
          esac

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

  publish_build:
    name: Build image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: publish_prepare
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
            machine: x86_64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
            machine: aarch64
    steps:
      - name: Checkout exact source commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Assert native runner architecture
        shell: bash
        run: |
          set -euo pipefail
          actual="$(uname -m)"
          if [[ "$actual" != "${{ matrix.machine }}" ]]; then
            echo "Expected ${{ matrix.machine }} runner, received $actual." >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push architecture digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/Dockerfile.runtime
          platforms: ${{ matrix.platform }}
          labels: ${{ needs.publish_prepare.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          provenance: mode=max
          cache-from: |
            type=gha,scope=runtime-${{ matrix.arch }}
            type=registry,ref=${{ env.REGISTRY_IMAGE }}:buildcache-${{ matrix.arch }}
          cache-to: |
            type=gha,scope=runtime-${{ matrix.arch }},mode=max,ignore-error=true
            ${{ github.ref == 'refs/heads/main' && format('type=registry,ref=ghcr.io/gigaionllc/rustdesk-api-server:buildcache-{0},mode=max,oci-mediatypes=true,image-manifest=true,ignore-error=true', matrix.arch) || '' }}

      - name: Smoke-test published architecture
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          EXPECTED_ARCH: ${{ matrix.arch }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail

          if [[ ! "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Build did not return a valid image digest." >&2
            exit 1
          fi

          image="${REGISTRY_IMAGE}@${IMAGE_DIGEST}"
          docker pull --platform "$PLATFORM" "$image"

          actual_arch="$(docker image inspect "$image" --format '{{.Architecture}}')"
          if [[ "$actual_arch" != "$EXPECTED_ARCH" ]]; then
            echo "Expected $EXPECTED_ARCH image, received $actual_arch." >&2
            exit 1
          fi

          docker run --rm --platform "$PLATFORM" --entrypoint php "$image" -r '
            if (PHP_VERSION_ID < 80500 || PHP_VERSION_ID >= 80600) {
                fwrite(STDERR, "Expected PHP 8.5.x.\n");
                exit(1);
            }

            $required = ["pdo_mysql", "mbstring", "intl", "gmp", "bcmath", "zip", "gd", "Zend OPcache", "ldap"];
            $missing = array_values(array_filter($required, static fn (string $extension): bool => ! extension_loaded($extension)));
            if ($missing !== []) {
                fwrite(STDERR, "Missing PHP extensions: ".implode(", ", $missing)."\n");
                exit(1);
            }

            require "/var/www/html/vendor/autoload.php";
          '
          bash scripts/ci-runtime-smoke.sh "$image" "$EXPECTED_ARCH" "$PLATFORM"

      - name: Export digest artifact
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/digests"
          touch "$RUNNER_TEMP/digests/${IMAGE_DIGEST#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true

  publish_manifest:
    name: Publish multi-architecture image
    runs-on: ubuntu-24.04
    needs: [publish_prepare, publish_build]
    permissions:
      actions: read
      contents: read
      packages: write
    concurrency:
      group: ghcr-rustdesk-api-final-tags
      cancel-in-progress: false
    steps:
      - name: Confirm ref is still current
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          if [[ "$main_sha" != "$GITHUB_SHA" ]]; then
            echo "Current main is $main_sha; refusing to publish stale commit $GITHUB_SHA." >&2
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            ref_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}")"
            ref_type="$(jq -r '.object.type' <<< "$ref_json")"
            ref_sha="$(jq -r '.object.sha' <<< "$ref_json")"
            if [[ "$ref_type" != "tag" ]]; then
              echo "Release tag $GITHUB_REF_NAME is no longer annotated." >&2
              exit 1
            fi

            tag_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${ref_sha}")"
            if [[ "$(jq -r '.object.type' <<< "$tag_json")" != "commit" || "$(jq -r '.object.sha' <<< "$tag_json")" != "$GITHUB_SHA" ]]; then
              echo "Annotated release tag $GITHUB_REF_NAME no longer points directly to $GITHUB_SHA." >&2
              exit 1
            fi
          fi

      - name: Download architecture digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Validate architecture digests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t digests < <(find "$RUNNER_TEMP/digests" -maxdepth 1 -type f -printf '%f\n' | sort -u)

          if [[ "${#digests[@]}" -ne 2 ]]; then
            echo "Expected exactly two unique architecture digests; found ${#digests[@]}." >&2
            exit 1
          fi

          for digest in "${digests[@]}"; do
            if [[ ! "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              echo "Invalid architecture digest filename: $digest" >&2
              exit 1
            fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Publish final image tags
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISH_TAGS: ${{ needs.publish_prepare.outputs.tags }}
        run: |
          set -euo pipefail

          live_main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          if [[ "$live_main_sha" != "$GITHUB_SHA" ]]; then
            echo "Current main is $live_main_sha; refusing to promote stale commit $GITHUB_SHA." >&2
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            ref_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}")"
            ref_type="$(jq -r '.object.type' <<< "$ref_json")"
            ref_sha="$(jq -r '.object.sha' <<< "$ref_json")"
            if [[ "$ref_type" != "tag" ]]; then
              echo "Release tag $GITHUB_REF_NAME is no longer annotated." >&2
              exit 1
            fi

            tag_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${ref_sha}")"
            if [[ "$(jq -r '.object.type' <<< "$tag_json")" != "commit" || "$(jq -r '.object.sha' <<< "$tag_json")" != "$GITHUB_SHA" ]]; then
              echo "Annotated release tag $GITHUB_REF_NAME no longer points directly to $GITHUB_SHA." >&2
              exit 1
            fi
          fi

          mapfile -t digests < <(find "$RUNNER_TEMP/digests" -maxdepth 1 -type f -printf '%f\n' | sort -u)
          mapfile -t tags < <(printf '%s\n' "$PUBLISH_TAGS" | sed '/^[[:space:]]*$/d')

          if [[ "${#tags[@]}" -eq 0 ]]; then
            echo "No final image tags were generated." >&2
            exit 1
          fi

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(--tag "$tag")
          done

          sources=()
          for digest in "${digests[@]}"; do
            sources+=("${REGISTRY_IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"

      - name: Verify final manifest and tags
        shell: bash
        env:
          PUBLISH_TAGS: ${{ needs.publish_prepare.outputs.tags }}
        run: |
          set -euo pipefail
          mapfile -t tags < <(printf '%s\n' "$PUBLISH_TAGS" | sed '/^[[:space:]]*$/d')
          primary_tag="${tags[0]}"
          manifest_file="$RUNNER_TEMP/final-manifest.json"

          docker buildx imagetools inspect --raw "$primary_tag" > "$manifest_file"
          jq -e '
            ([.manifests[].platform
              | select(.os != "unknown" and .architecture != "unknown")
              | "\(.os)/\(.architecture)"] | sort)
            == ["linux/amd64", "linux/arm64"]
          ' "$manifest_file" >/dev/null
          jq -e '
            [.manifests[]
              | select(.annotations["vnd.docker.reference.type"] == "attestation-manifest")]
            | length >= 2
          ' "$manifest_file" >/dev/null

          expected_digest="$(docker buildx imagetools inspect --format '{{.Manifest.Digest}}' "$primary_tag")"
          for tag in "${tags[@]}"; do
            actual_digest="$(docker buildx imagetools inspect --format '{{.Manifest.Digest}}' "$tag")"
            if [[ "$actual_digest" != "$expected_digest" ]]; then
              echo "$tag resolved to $actual_digest instead of $expected_digest." >&2
              exit 1
            fi
          done

          echo "Published ${#tags[@]} tags at $expected_digest for linux/amd64 and linux/arm64."
